// ── Drawing utilities ─────────────────────────────────────────────
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ── Draw floor ────────────────────────────────────────────────────
function drawFloor() {
  ctx.fillStyle = '#04060f';
  ctx.fillRect(0, 0, CW, CH);
  // tile grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  const T = 30;
  for (let x = 0; x <= CW; x += T) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CH); ctx.stroke(); }
  for (let y = 0; y <= CH; y += T) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CW,y); ctx.stroke(); }
}

// ── Draw rooms ────────────────────────────────────────────────────

    // carpet fill
    ctx.fillStyle = bg;
    rr(ctx, rm.x, rm.y, rm.w, rm.h, 6);
    ctx.fill();

    // border
    ctx.strokeStyle = c;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.45;
    rr(ctx, rm.x + 0.75, rm.y + 0.75, rm.w - 1.5, rm.h - 1.5, 6);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // room label
    ctx.fillStyle = c;
    ctx.globalAlpha = 0.6;
    ctx.font = 'bold 9px "Courier New",monospace';
    ctx.fillText(rm.label, rm.x + 8, rm.y + 13);
    ctx.globalAlpha = 1;
  });

  // boardroom table
  ctx.fillStyle = '#12182e';
  rr(ctx, 290, 55, 380, 80, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(200,180,255,0.25)';
  ctx.lineWidth = 1;
  rr(ctx, 290, 55, 380, 80, 8);
  ctx.stroke();

  // meeting table

  ctx.fill();
  ctx.strokeStyle = 'rgba(100,120,220,0.3)';
  ctx.lineWidth = 1;
  rr(ctx, 130, 558, 640, 36, 6);
  ctx.stroke();
}

// ── Draw desk ─────────────────────────────────────────────────────
function drawDesk(cx, cy, deptColor) {
  const W = 46, H = 22;

  // desk surface
  ctx.fillStyle = '#111828';
  rr(ctx, cx - W/2, cy - H/2, W, H, 3);
  ctx.fill();
  ctx.strokeStyle = '#1e2840';
  ctx.lineWidth = 1;
  rr(ctx, cx - W/2, cy - H/2, W, H, 3);
  ctx.stroke();

  // monitor stand
  ctx.fillStyle = '#252535';
  ctx.fillRect(cx - 2, cy - H/2 - 4, 4, 5);

  // monitor bezel
  ctx.fillStyle = '#080e1c';
  rr(ctx, cx - 13, cy - H/2 - 17, 26, 14, 2);
  ctx.fill();

  // screen glow
  ctx.fillStyle = deptColor;
  ctx.globalAlpha = 0.38;
  rr(ctx, cx - 11, cy - H/2 - 15, 22, 10, 1);
  ctx.fill();
  ctx.globalAlpha = 1;

  // fake text lines on screen
  ctx.fillStyle = deptColor;
  ctx.globalAlpha = 0.75;
  const sy = cy - H/2 - 13;
  ctx.fillRect(cx - 8, sy,     12, 1);
  ctx.fillRect(cx - 8, sy + 3,  9, 1);
  ctx.fillRect(cx - 8, sy + 6, 14, 1);
  ctx.globalAlpha = 1;

  // chair
  ctx.fillStyle = '#181e30';
  rr(ctx, cx - 10, cy + H/2 + 2, 20, 14, 3);
  ctx.fill();
  ctx.fillStyle = '#0e1325';
  ctx.fillRect(cx - 3, cy + H/2 + 14, 6, 6);
}

      ctx.fill();
    } else {
      drawDesk(d.cx, d.cy, color);
    }
  });
}

    rr(ctx, px - 8, py + 8, 16, 12, 2);
    ctx.fill();
    ctx.fillStyle = '#1a4025';
    ctx.beginPath(); ctx.arc(px, py + 5, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#245530';
    ctx.beginPath(); ctx.arc(px - 5, py, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 5, py, 6, 0, Math.PI*2); ctx.fill();
  });

  // Coffee machine (bottom right of marketing zone)
  const cm = {x: 330, y: 390};
  ctx.fillStyle = '#1a1a2e';
  rr(ctx, cm.x, cm.y, 28, 32, 3);
  ctx.fill();
  ctx.fillStyle = '#cc4422';
  ctx.fillRect(cm.x + 4, cm.y + 4, 20, 12);
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(cm.x + 14, cm.y + 24, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#442211';
  ctx.beginPath(); ctx.arc(cm.x + 14, cm.y + 24, 3, 0, Math.PI*2); ctx.fill();

  // Whiteboard (HR zone)
  ctx.fillStyle = '#f0f4ff';
  rr(ctx, 860, 395, 18, 100, 2);
  ctx.fill();
  ctx.strokeStyle = '#334466';
  ctx.lineWidth = 1;
  rr(ctx, 860, 395, 18, 100, 2);
  ctx.stroke();
  ctx.fillStyle = '#00d4ff';
  ctx.globalAlpha = 0.5;
  ctx.fillRect(863, 400, 12, 1.5);
  ctx.fillRect(863, 405, 8, 1.5);
  ctx.fillRect(863, 410, 11, 1.5);
  ctx.globalAlpha = 1;

  // Windows (top wall)
  [[200, 4], [380, 4], [560, 4], [740, 4]].forEach(([wx, wy]) => {
    ctx.fillStyle = '#0a1828';
    ctx.fillRect(wx, wy, 60, 18);
    ctx.strokeStyle = 'rgba(100,160,255,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(wx, wy, 60, 18);
    ctx.fillStyle = 'rgba(100,160,255,0.08)';
    ctx.fillRect(wx + 2, wy + 2, 56, 14);
  });
}

// ── Draw agent character ──────────────────────────────────────────
function drawCharacter(cx, cy, color, bobY, isWalking, walkCycle) {
  const by = bobY;
  const t = walkCycle;

  // shadow
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 16 + by, 8, 2.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // legs
  const ls = isWalking ? Math.sin(t * 8) * 3 : 0;
  ctx.fillStyle = '#141828';
  ctx.fillRect(cx - 5, cy + 7 + by, 4, 7 + ls);
  ctx.fillRect(cx + 1, cy + 7 + by, 4, 7 - ls);

  // shoes
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(cx - 6, cy + 14 + by + ls, 5, 3);
  ctx.fillRect(cx + 1, cy + 14 + by - ls, 5, 3);

  // body / shirt
  ctx.fillStyle = color;
  ctx.fillRect(cx - 6, cy + by, 12, 9);

  // collar
  ctx.fillStyle = '#eeeeee';
  ctx.fillRect(cx - 1, cy + by, 2, 5);

  // arms
  ctx.fillStyle = color;
  const ar = isWalking ? -ls * 0.5 : 0;
  ctx.fillRect(cx - 9, cy + 1 + by + ar, 3, 7);
  ctx.fillRect(cx + 6, cy + 1 + by - ar, 3, 7);

  // neck
  ctx.fillStyle = '#c89060';
  ctx.fillRect(cx - 2, cy - 3 + by, 4, 4);

  // head
  ctx.fillStyle = '#c89060';
  ctx.beginPath();
  ctx.arc(cx, cy - 8 + by, 7, 0, Math.PI*2);
  ctx.fill();

  // hair (top half, dept color)
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(cx, cy - 8 + by, 7, Math.PI, 0);
  ctx.fill();

  // eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx - 4, cy - 11 + by, 2.5, 2);
  ctx.fillRect(cx + 1.5, cy - 11 + by, 2.5, 2);
  ctx.fillStyle = '#111';
  ctx.fillRect(cx - 3.5, cy - 11 + by, 1.5, 1.5);
  ctx.fillRect(cx + 2, cy - 11 + by, 1.5, 1.5);
}

// ── Draw speech bubble ────────────────────────────────────────────
function drawBubble(cx, cy, text, color, alpha) {
  if (alpha <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  ctx.font = '9.5px "Courier New",monospace';
  const tw = ctx.measureText(text).width;
  const pad = 10, bh = 18;
  const bw = tw + pad * 2;
  const bx = cx - bw / 2;
  const by = cy - 52;

  // bg
  ctx.fillStyle = 'rgba(6,9,22,0.94)';
  rr(ctx, bx, by, bw, bh, 5);
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  rr(ctx, bx, by, bw, bh, 5);
  ctx.stroke();

  // tail
  ctx.beginPath();
  ctx.moveTo(cx - 5, by + bh - 0.5);
  ctx.lineTo(cx, by + bh + 7);
  ctx.lineTo(cx + 5, by + bh - 0.5);
  ctx.strokeStyle = color;
  ctx.stroke();

  // text
  ctx.fillStyle = color;
  ctx.fillText(text, cx - tw / 2, by + 13);
  ctx.restore();
}

// ── Draw emote ────────────────────────────────────────────────────
function drawEmote(cx, cy, emote, alpha) {
  if (alpha <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = alpha * 0.85;
  ctx.font = '14px sans-serif';
  ctx.fillText(emote, cx - 7, cy - 30);
  ctx.restore();
}

// ── Agent name plate ──────────────────────────────────────────────
function drawNamePlate(cx, cy, name, color) {
  ctx.font = 'bold 8px "Courier New",monospace';
  const tw = ctx.measureText(name).width;
  ctx.fillStyle = 'rgba(4,6,16,0.7)';
  ctx.fillRect(cx - tw/2 - 3, cy + 18, tw + 6, 11);
  ctx.fillStyle = color;
  ctx.fillText(name, cx - tw/2, cy + 27);
}

// ── Main draw ─────────────────────────────────────────────────────
function draw() {
  drawFloor();
  drawRooms();
  drawDecorations();
  drawAllDesks();

  // Sort agents by Y for depth
  const sorted = AGENTS.slice().sort((a,b) => {
    const sa = agentState[a.id], sb = agentState[b.id];
    return sa.y - sb.y;
  });

  sorted.forEach(ag => {
    const st  = agentState[ag.id];
    const col = DEPT_COLORS[ag.dept];
    const bob = Math.sin(time * 1.5 + st.bobPhase) * 1.5;
    const walking = st.state === 'walking';
    const wc = walking ? time : 0;

    drawCharacter(st.x, st.y, col, bob, walking, wc);
    drawNamePlate(st.x, st.y, ag.name.split(' ')[0], col);

    const emote = ag.emotes[st.emoteIdx % ag.emotes.length];
    const eAlpha = st.state === 'idle' ? 0.7 + 0.3 * Math.sin(time + st.bobPhase) : 0.3;
    drawEmote(st.x, st.y, emote, eAlpha);

    drawBubble(st.x, st.y, ag.msgs[st.msgIdx % ag.msgs.length], col, st.speechAlpha);
  });
}

// ── Behavior AI ───────────────────────────────────────────────────
const meetingSpots = [
  {x:200,y:560},{x:280,y:560},{x:360,y:560},{x:440,y:560},
  {x:520,y:560},{x:600,y:560},{x:680,y:560}
];

function updateBehavior(dt) {
  AGENTS.forEach(ag => {
    const st = agentState[ag.id];

    // speech alpha
    if (st.state === 'idle') {
      st.speechTimer -= dt;
      if (st.speechTimer <= 0) {
        st.speechAlpha = 1;
        st.speechTimer = 4 + Math.random() * 4;
        st.msgIdx = (st.msgIdx + 1) % ag.msgs.length;
        setTimeout(() => { if (agentState[ag.id]) agentState[ag.id].speechAlpha = 0; }, 3500);
      }
    } else {
      st.speechAlpha = Math.max(0, st.speechAlpha - dt * 0.8);
    }

    // state machine
    st.stateTimer -= dt;
    if (st.stateTimer <= 0) {
      const roll = Math.random();

      if (st.state === 'idle') {
        if (roll < 0.3) {
          // walk to a random colleague's desk
          const target = AGENTS[Math.floor(Math.random() * AGENTS.length)];
          const td = DESKS.find(d => d.id === target.id);
          if (td) {
            st.tx = td.cx + (Math.random() - 0.5) * 20;
            st.ty = td.cy - 22;
          }
          st.state = 'walking';
          st.stateTimer = 4 + Math.random() * 5;
          st.emoteIdx = (st.emoteIdx + 1) % ag.emotes.length;
        } else if (roll < 0.5) {
          // walk to meeting room
          const spot = meetingSpots[Math.floor(Math.random() * meetingSpots.length)];
          st.tx = spot.x;
          st.ty = spot.y;
          st.state = 'walking';
          st.stateTimer = 5 + Math.random() * 6;
        } else {
          // stay idle, change message + emote
          st.stateTimer = 8 + Math.random() * 10;
          st.emoteIdx = (st.emoteIdx + 1) % ag.emotes.length;
        }
      } else {
        // return home
        st.tx = st.homeX;
        st.ty = st.homeY;
        st.state = 'returning';
        st.stateTimer = 3 + Math.random() * 3;
      }
    }

    // movement
    if (st.state === 'walking' || st.state === 'returning') {
      const dx = st.tx - st.x;
      const dy = st.ty - st.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 2) {
        st.x = st.tx; st.y = st.ty;
        if (st.state === 'returning') {
          st.state = 'idle';
          st.stateTimer = 10 + Math.random() * 15;
        }
      } else {
        const spd = st.speed * dt;
        st.x += (dx / dist) * Math.min(spd, dist);
        st.y += (dy / dist) * Math.min(spd, dist);
      }
    }
  });
}

// ── Animation loop ────────────────────────────────────────────────
let lastT = 0;
function loop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.05);
  lastT = t;
  time += dt;

  updateBehavior(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Tooltip on hover ─────────────────────────────────────────────
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;

  let found = null;
  AGENTS.forEach(ag => {
    const st = agentState[ag.id];
    const dx = mx - st.x, dy = my - st.y;
    if (Math.sqrt(dx*dx + dy*dy) < 18) found = ag;
  });

  canvas.title = found ? `${found.name} — ${found.role}` : '';
});
